<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<section layout:fragment="body" class="py-5">
    <div class="container">
        <form class="row g-3" method="post" th:action="@{/clubs/{clubId}/edit(clubId=${club.id})}" th:object="${club}">
            <input type="hidden" th:field="{*id}">
            <div class="col-md-6">
                <label for="title" class="form-label">Club Title</label>
                <input
                        type="text"
                        class="form-control"
                        id="title"
                        name="title"
                        th:field="*{title}"
                        placeholder="Club name goes here">
            </div>
            <div class="col-md-6">
                <label for="description" class="form-label">Description</label>
                <input
                        type="text"
                        class="form-control"
                        id="description"
                        name="description"
                        th:field="*{description}"
                        placeholder="Club description goes here">
            </div>
            <div class="col-12">
                <label for="photoURL" class="form-label">Photo URL</label>
                <input
                        type="text"
                        class="form-control"
                        id="photoURL"
                        name="photoURL"
                        th:field="*{photoURL}"
                        placeholder="http://image...">
            </div>
            <div class="col-12 pyx-5">
                <button type="submit" class="btn btn-success col-sm-2">Create Club</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
